on:
  push:
    branches:
    - main
name: 🚀 Validate and deploy website on push
jobs:
  web-flow:
    name: Website Build, Validate, and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'  
      - name: Mettre à jour la date de dernière mise à jour dans index.html
        run: |
          DATE_FR=$(date +"%d/%m/%Y %H:%M")
          sed -i "s#<span id=\"updateDate\">.*</span>#<span id=\"updateDate\">$DATE_FR</span>#" index.html
      - name: Install project dependencies
        run: npm ci
      - name: ✅ Validating HTML
        run: |
          npx htmlhint index.html
      - name: ✅ Validating JavaScript
        run: |
          npx eslint index.js
      - name: ✅ Validating CSS
        run: |
          npx stylelint index.css
      - name: 📝 Minifying HTML
        run: |
          npx html-minifier-terser --collapse-whitespace --remove-comments --minify-css true --minify-js true -o index.html index.html
      - name: 📝 Minifying JavaScript
        run: |
          npx terser index.js -o index.js --compress --mangle --comments "/eslint/"
      - name: 📝 Minifying CSS
        run: |
          npx csso-cli index.css --output index.css
      - name: ✅ Validate minified HTML
        run: |
          npx htmlhint index.html
      - name: ✅ Validate minified JavaScript
        run: |
          npx eslint index.js
      - name: ✅ Validate minified CSS
        run: |
          npx stylelint index.css
      - name: Download latest release of WebReleaseNotes
        uses: robinraju/release-downloader@v1.13
        with:
          repository: "zRenard/WebReleaseNotes"
          latest: true
          fileName: "*"  # Download all files
          out-file-path: "./"  # Save to the root of the workspace
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install Python dependencies
        run: pip install GitPython
      - name: 📦 Build release notes JSON
        run: python release_notes.py --num_commits 15 --output release_notes.json 
      - name: � Prepare deployment files
        run: |
          mkdir -p deploy
          mkdir -p deploy/vendor/bootstrap
          mkdir -p deploy/vendor/datatables
          mkdir -p deploy/vendor/jquery
          mkdir -p deploy/vendor/moment

          cp node_modules/bootstrap/dist/css/bootstrap.min.css deploy/vendor/bootstrap/
          cp node_modules/bootstrap/dist/js/bootstrap.bundle.min.js deploy/vendor/bootstrap/
          cp node_modules/datatables.net/js/dataTables.js deploy/vendor/datatables/
          cp node_modules/datatables.net-bs5/css/dataTables.bootstrap5.css deploy/vendor/datatables/
          cp node_modules/datatables.net-bs5/js/dataTables.bootstrap5.js deploy/vendor/datatables/
          cp node_modules/jquery/dist/jquery.min.js deploy/vendor/jquery/
          cp node_modules/moment/min/moment.min.js deploy/vendor/moment/

          cp index.html deploy/
          cp release_notes.html deploy/
          cp release_notes.json deploy/
          cp release_notes.js deploy/
          cp release_notes.css deploy/
          cp index.js deploy/
          cp index.css deploy/
          cp nanardi.png deploy/
          cp goodenough.jpg deploy/
          cp fav.png deploy/
          cp -r media deploy/
      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.ftp_server }}
          username: ${{ secrets.ftp_username }}
          password: ${{ secrets.ftp_password }}
          server-dir: /www/nanardi/
          local-dir: ./deploy/
          state-name: .ftp-deploy-sync-state.json
          dry-run: false
